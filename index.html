<!DOCTYPE html>
<html>
<head>
  <title>UM Pune Expense Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background:#f2f4f8; padding:10px; }

    h2 { background:#ff9933; color:white; padding:12px; border-radius:8px; }

    .box {
      background:white;
      padding:15px;
      margin-top:10px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    input, select {
      width:100%;
      padding:8px;
      margin-top:6px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button {
      padding:8px;
      margin-top:10px;
      width:100%;
      background:#ff9933;
      border:none;
      color:white;
      border-radius:6px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-small {
      width:auto;
      padding:5px 8px;
      font-size:11px;
    }

    table {
      width:100%;
      margin-top:15px;
      border-collapse:collapse;
      background:white;
      font-size:11px;
    }

    th, td {
      padding:6px;
      border:1px solid #ddd;
      text-align:center;
      max-width:120px;
      word-wrap:break-word;
    }

    .flow { text-align:left; font-size:11px; }
    .approved { color:green; }
    .pending { color:orange; }

  </style>
</head>

<body>

<h2>UM Pune Expense Flow</h2>

<div class="box">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginStatus"></p>
</div>

<div class="box" id="app" style="display:none;">

  <h3 id="welcome"></h3>

  <div id="submitBox">
    <h4>Submit Expense</h4>

    <input type="date" id="date">
    <input type="text" id="paidTo" placeholder="Paid To">
    <input type="number" id="amount" placeholder="Amount">
    <input type="text" id="paidFor" placeholder="Paid For">

    <select id="paymentType">
      <option value="">Payment Type</option>
      <option>Cash</option>
      <option>UPI</option>
      <option>Bank Transfer</option>
    </select>

    <input type="file" id="billImage">

    <button id="submitBtn" onclick="submitExpense()">Submit</button>
    <p id="status"></p>
  </div>

  <button onclick="exportExcel()">📥 Export</button>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Date</th>
        <th>Paid To</th>
        <th>Amt</th>
        <th>By</th>
        <th>Flow</th>
        <th>Bill</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "umpunefinance-1ab17.firebaseapp.com",
  projectId: "umpunefinance-1ab17",
  storageBucket: "umpunefinance-1ab17.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

const approvers = ["ram","shridhar","pravin","damodar"];

const users = {
  "ram": { password: "ram123", roles: ["submitter","approver"] },
  "shridhar": { password: "shridhar123", roles: ["submitter","approver"] },
  "pravin": { password: "pravin123", roles: ["submitter","approver"] },
  "damodar": { password: "damodar123", roles: ["submitter","approver"] },
  "admin": { password: "admin123", roles: ["readonly"] }
};

let currentUser = "";
let submitting = false;

// PREVENT ENTER DOUBLE SUBMIT
document.addEventListener("keydown", e => {
  if (e.key === "Enter") e.preventDefault();
});

// LOGIN
function login() {
  const u = username.value.trim().toLowerCase();
  const p = password.value.trim();

  if (users[u].roles.includes("readonly")) {
  submitBox.style.display = "none";
  status.innerText = "ℹ️ You are a Read-only user. You cannot submit or approve expenses.";
  } else {
  submitBox.style.display = "block";
  status.innerText = "";
  }

  if (!users[u] || users[u].password !== p) {
    loginStatus.innerText = "❌ Invalid login";
    return;
  }

  currentUser = u;

  loginStatus.innerText = "✅ Logged in";
  app.style.display = "block";
  welcome.innerText = "Welcome " + u;

  loadExpenses();
}

// SUBMIT
async function submitExpense() {

  if (users[currentUser].roles.includes("readonly")) {
  status.innerText = "❌ Read-only user cannot submit";
  return;
  }

  if (submitting) return;
  submitting = true;

  const d = date.value.trim();
  const pTo = paidTo.value.trim();
  const amt = amount.value.trim();
  const pFor = paidFor.value.trim();
  const type = paymentType.value;

  if (!d || !pTo || !amt || !pFor || !type) {
    status.innerText = "❌ All fields mandatory";
    submitting = false;
    return;
  }

  let imageUrl = "";
  const file = billImage.files[0];

  if (file) {
  try {
    status.innerText = "Uploading image...";

    const ref = storage.ref("bills/" + Date.now() + "_" + file.name);

    const snapshot = await ref.put(file);

    imageUrl = await snapshot.ref.getDownloadURL();

    status.innerText = "✅ Image uploaded";
    console.log("Image URL:", imageUrl);

  } catch (err) {
    console.error(err);
    status.innerText = "❌ Upload failed: " + err.message;
    submitting = false;
    return;
  }
}

  await db.collection("expenses").add({
    date: d,
    paidTo: pTo,
    amount: amt,
    paidFor: pFor,
    paymentType: type,
    createdBy: currentUser,
    approvals: [],
    bill: imageUrl,
    timestamp: Date.now()
  });

  status.innerText = "✅ Expense Saved";

  document.querySelectorAll("input").forEach(i => i.value="");
  paymentType.value="";

  submitting = false;

  loadExpenses();
}

// APPROVE
async function approve(id) {

  const ref = db.collection("expenses").doc(id);
  const snap = await ref.get();
  const data = snap.data();

  let approvals = data.approvals || [];

  if (data.createdBy === currentUser) {
    alert("Sorry, you cannot approve your own expense");
    return;
  }

  if (users[currentUser].roles.includes("readonly")) {
  alert("You are a read-only user. Approval not allowed.");
  return;
  }

  if (approvals.includes(currentUser)) {
    alert("Already approved");
    return;
  }

  approvals.push(currentUser);

  await ref.update({ approvals });

  loadExpenses();
}

// EXPORT
async function exportExcel() {

  const snap = await db.collection("expenses").get();

  let csv = "Date,Paid To,Amount,By,Status\n";

  snap.forEach(doc=>{
    const d = doc.data();
    const totalNeeded = approvers.length - 1;
    const count = d.approvals.length;

    const status = count === totalNeeded
      ? "Approved"
      : `Pending (${count}/${totalNeeded})`;

    csv += `${d.date},${d.paidTo},${d.amount},${d.createdBy},${status}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "expenses.csv";
  a.click();
}

// LOAD
async function loadExpenses() {

  tableBody.innerHTML = "";

  const snap = await db.collection("expenses")
    .orderBy("timestamp","desc")
    .get();

  let i = 1;

  snap.forEach(doc => {

    const d = doc.data();
    const approvals = d.approvals || [];

    const totalNeeded = approvers.length - 1;

    let flow = "";

    approvers.forEach(a => {
      if (a === d.createdBy) return;

      flow += approvals.includes(a)
        ? `✅ ${a} `
        : `⏳ ${a} `;
    });

    const status = approvals.length === totalNeeded
      ? "Approved"
      : `Pending (${approvals.length}/${totalNeeded})`;

    const bill = d.bill
      ? `<a href="${d.bill}" target="_blank">📄</a>`
      : "-";

    const action = `<button class="btn-small" onclick="approve('${doc.id}')">Approve</button>`;

    tableBody.innerHTML += `
      <tr>
        <td>${i++}</td>
        <td>${d.date}</td>
        <td>${d.paidTo}</td>
        <td>${d.amount}</td>
        <td>${d.createdBy}</td>
        <td class="flow">${flow}<br><b>${status}</b></td>
        <td>${bill}</td>
        <td>${action}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
