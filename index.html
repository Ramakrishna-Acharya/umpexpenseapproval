<!DOCTYPE html>
<html>
<head>
  <title>UM Pune Expense App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #fff7ed;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      color: #e65100;
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #e65100;
      color: white;
      border: none;
      font-weight: bold;
    }

    button:hover {
      background: #bf360c;
    }

    .status-approved { color: green; }
    .status-rejected { color: red; }
  </style>
</head>

<body>

<div class="container">

<h2>🛕 UM Pune Expense Flow</h2>

<div class="card">
  <h3>Login</h3>
  <input id="username" placeholder="username (ram)">
  <input id="password" type="password" placeholder="password">

  <select id="role">
    <option value="submitter">Submitter</option>
    <option value="approver">Approver</option>
  </select>

  <button onclick="login()">Login</button>
  <p id="loginStatus"></p>
</div>

<div id="app" style="display:none;">

  <div class="card" id="submitSection">
    <h3>Submit Expense</h3>
    <input id="amount" placeholder="Amount">
    <input id="desc" placeholder="Description">
    <input id="date" type="date">
    <button onclick="submitExpense()">Submit Expense</button>
  </div>

  <div class="card">
    <h3>All Expenses</h3>
    <div id="expenses"></div>
  </div>

</div>

</div>

<script>
// 🔴 FIREBASE CONFIG (ONLY CHANGE THIS)
const firebaseConfig = {
  apiKey: "AIzaSyA36jPkq5rAVPme55llgsZumsvzOPFCQgk",
  authDomain: "umpunefinance-1ab17.firebaseapp.com",
  projectId: "umpunefinance-1ab17"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔴 USERS (HARDCODED)
const users = {
  "ram": { password: "ram123", roles: ["submitter", "approver"] },
  "shridhar": { password: "shridhar123", roles: ["approver"] },
  "pravin": { password: "pravin123", roles: ["approver"] },
  "damodar": { password: "damodar123", roles: ["approver"] },
  "admin.9999999999": { password: "admin123", roles: ["readonly"] }
};

let currentUser = "";
let currentRole = "";

// 🔴 LOGIN
function login() {
  const uname = document.getElementById("username").value;
  const pass = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  if (users[uname] && users[uname].password === pass) {

    if (!users[uname].roles.includes(role)) {
      document.getElementById("loginStatus").innerText = "❌ Role not allowed";
      return;
    }

    currentUser = uname;
    currentRole = role;

    document.getElementById("loginStatus").innerText =
      "✅ Logged in as " + role;

    document.getElementById("app").style.display = "block";

    // Hide submit if approver
    if (role === "approver") {
      document.getElementById("submitSection").style.display = "none";
    } else {
      document.getElementById("submitSection").style.display = "block";
    }

    loadExpenses();

  } else {
    document.getElementById("loginStatus").innerText = "❌ Invalid login";
  }
}

// 🔴 SUBMIT EXPENSE
async function submitExpense() {
  if (currentRole !== "submitter") {
    alert("Not allowed");
    return;
  }

  const amount = document.getElementById("amount").value;
  const desc = document.getElementById("desc").value;
  const date = document.getElementById("date").value;

  await db.collection("expenses").add({
    amount,
    desc,
    date,
    createdBy: currentUser,
    approvals: [],
    status: "pending"
  });

  alert("Expense Submitted");
  loadExpenses();
}

// 🔴 LOAD EXPENSES
async function loadExpenses() {
  const snapshot = await db.collection("expenses").get();
  console.log("Total docs:", snapshot.size);
  const div = document.getElementById("expenses");
  div.innerHTML = "";

  snapshot.forEach(doc => {
    const e = doc.data();

    let statusClass = "";
    if (e.status === "approved") statusClass = "status-approved";
    if (e.status === "rejected") statusClass = "status-rejected";

    let html = `
      <div style="border-bottom:1px solid #ccc; padding:10px;">
        ₹${e.amount} - ${e.desc} (${e.date}) <br>
        By: ${e.createdBy} <br>
        Status: <b class="${statusClass}">${e.status}</b> <br>
        Approvals: ${e.approvals.length}/3 <br>
    `;

    // Only approver & not own expense
    if (currentRole === "approver" && currentUser !== e.createdBy && e.status === "pending") {
      html += `
        <button onclick="approve('${doc.id}')">Approve</button>
        <button onclick="reject('${doc.id}')">Reject</button>
      `;
    }

    html += "</div>";
    div.innerHTML += html;
  });
}

// 🔴 APPROVE
async function approve(id) {
  const ref = db.collection("expenses").doc(id);
  const doc = await ref.get();
  let data = doc.data();

  if (!data.approvals.includes(currentUser)) {
    data.approvals.push(currentUser);
  }

  let status = data.approvals.length >= 3 ? "approved" : "pending";

  await ref.update({
    approvals: data.approvals,
    status
  });

  loadExpenses();
}

// 🔴 REJECT
async function reject(id) {
  await db.collection("expenses").doc(id).update({
    status: "rejected"
  });

  loadExpenses();
}
</script>

</body>
</html>
